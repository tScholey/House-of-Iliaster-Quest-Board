<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guild Records — House of Iliaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:       #2a1a08;
    --ink-mid:   #5c3a1e;
    --ink-light: #8b5e3c;
    --gold:      #b8860b;
    --gold-dark: #8b6508;
    --gold-pale: #f5e6c0;
    --parch:     #fdf3dc;
    --parch-mid: #f5e4b8;
    --parch-dark:#e8d49a;
    --border:    #c9a84c;
    --red-ink:   #8b1a1a;
    --red-pale:  #f7e8e8;
    --seal:      #7a1c1c;
    --dm-bg:     #f0dfc0;
    --dm-border: #c08030;
    --status-available: #2d6a2d;
    --status-taken:     #8b6508;
    --status-expired:   #5a5a5a;
    --status-completed: #1a5c5c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1c1008;
    background-image:
      radial-gradient(ellipse at 20% 0%, #2e1a08 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, #261408 0%, transparent 60%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    font-family: 'Crimson Pro', Georgia, serif;
    color: var(--ink);
  }

  /* ── Page header ─────────────────────────────────────────────────────── */
  .page-header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header-rule {
    width: 340px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 0 auto 0.9rem;
  }
  .guild-name {
    font-family: 'IM Fell English', Georgia, serif;
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    color: var(--gold);
    letter-spacing: 0.12em;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    margin-bottom: 0.3rem;
  }
  .board-title {
    font-family: 'IM Fell English', Georgia, serif;
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    color: var(--parch-mid);
    letter-spacing: 0.08em;
    font-style: italic;
  }

  /* ── Lock screen ─────────────────────────────────────────────────────── */
  #lock-screen {
    background: var(--parch);
    border: 2px solid var(--border);
    box-shadow: 0 4px 30px rgba(0,0,0,0.7), 0 0 0 6px #1c1008;
    width: 100%;
    max-width: 400px;
    padding: 2.5rem 2rem;
    text-align: center;
  }
  .lock-title {
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 1.2rem;
    color: var(--ink);
    margin-bottom: 0.4rem;
  }
  .lock-sub {
    font-size: 0.88rem;
    color: var(--ink-light);
    font-style: italic;
    margin-bottom: 1.5rem;
  }
  .lock-field {
    width: 100%;
    background: var(--parch-mid);
    border: 1px solid var(--border);
    color: var(--ink);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    padding: 0.5rem 0.8rem;
    text-align: center;
    letter-spacing: 0.1em;
    margin-bottom: 0.8rem;
  }
  .lock-field:focus { outline: none; border-color: var(--gold); }
  .lock-btn {
    background: var(--parch-dark);
    border: 1px solid var(--border);
    color: var(--ink);
    font-family: 'IM Fell English', serif;
    font-size: 0.9rem;
    padding: 0.5rem 1.8rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: background 0.15s;
  }
  .lock-btn:hover { background: var(--parch-mid); }
  .lock-error {
    font-size: 0.85rem;
    color: var(--red-ink);
    margin-top: 0.7rem;
    font-style: italic;
    display: none;
  }

  /* ── Main board ──────────────────────────────────────────────────────── */
  #dm-board { display: none; width: 100%; max-width: 1100px; }

  .board-frame {
    background: var(--parch);
    border: 2px solid var(--border);
    box-shadow: inset 0 0 40px rgba(184,134,11,0.08), 0 4px 30px rgba(0,0,0,0.7), 0 0 0 6px #1c1008;
    padding: 1.8rem 2rem 2.5rem;
    position: relative;
  }
  .board-frame::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(184,134,11,0.2);
    pointer-events: none;
  }

  /* ── Toolbar ─────────────────────────────────────────────────────────── */
  .toolbar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid var(--parch-dark);
  }
  .toolbar select, .toolbar input[type="text"] {
    background: var(--parch-mid);
    border: 1px solid var(--border);
    color: var(--ink);
    font-family: 'Crimson Pro', serif;
    font-size: 0.9rem;
    padding: 0.3rem 0.7rem;
    cursor: pointer;
  }
  .toolbar select:focus, .toolbar input:focus { outline: none; border-color: var(--gold); }
  .dm-badge {
    font-size: 0.78rem;
    padding: 0.2rem 0.7rem;
    background: var(--seal);
    color: var(--gold-pale);
    letter-spacing: 0.08em;
    font-family: 'IM Fell English', serif;
  }
  .count-note { font-size: 0.85rem; color: var(--ink-light); font-style: italic; margin-left: auto; }
  .back-link {
    font-size: 0.82rem;
    color: var(--gold-dark);
    text-decoration: none;
    letter-spacing: 0.04em;
  }
  .back-link:hover { color: var(--ink); }

  /* ── Tier header ─────────────────────────────────────────────────────── */
  .tier-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .tier-rule { flex: 1; height: 1px; background: var(--parch-dark); }
  .tier-label {
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    color: var(--ink-light);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ── Quest grid ──────────────────────────────────────────────────────── */
  .quest-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  /* ── Quest card ──────────────────────────────────────────────────────── */
  .quest-card {
    background: var(--parch-mid);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .quest-card.urgent { border-color: var(--red-ink); }
  .quest-card.hidden-card { opacity: 0.45; border-style: dashed; }

  .status-bar { height: 3px; }

  .card-body { padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: 0.6rem; flex: 1; }

  .card-title {
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 0.98rem;
    color: var(--ink);
    line-height: 1.4;
    border-bottom: 1px solid var(--parch-dark);
    padding-bottom: 0.5rem;
  }
  .card-summary { font-size: 0.88rem; color: var(--ink-mid); line-height: 1.7; font-style: italic; }
  .expires-note { font-size: 0.78rem; color: var(--red-ink); }

  .card-meta {
    margin-top: auto;
    padding-top: 0.6rem;
    border-top: 1px solid var(--parch-dark);
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .meta-row { display: flex; gap: 0.5rem; font-size: 0.8rem; }
  .meta-label { color: var(--gold-dark); min-width: 62px; font-weight: 600; letter-spacing: 0.03em; }
  .meta-val { color: var(--ink); }
  .meta-reward { color: var(--ink-mid); font-style: italic; }

  /* ── DM strip ────────────────────────────────────────────────────────── */
  .dm-strip {
    padding: 0.6rem 1.1rem;
    background: rgba(192,128,48,0.12);
    border-top: 1px solid var(--dm-border);
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
  }
  .type-pill {
    font-size: 0.72rem;
    padding: 0.15rem 0.55rem;
    border: 1px solid var(--dm-border);
    color: var(--ink-mid);
    letter-spacing: 0.05em;
    background: var(--parch);
  }
  .dm-select {
    font-size: 0.78rem;
    padding: 0.2rem 0.5rem;
    border: 1px solid var(--border);
    background: var(--parch);
    color: var(--ink);
    font-family: 'Crimson Pro', serif;
    cursor: pointer;
  }
  .dm-btn {
    font-size: 0.78rem;
    padding: 0.2rem 0.6rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--ink-mid);
    font-family: 'IM Fell English', serif;
    cursor: pointer;
    transition: background 0.12s;
  }
  .dm-btn:hover { background: var(--parch-dark); }
  .dm-btn.active { border-color: var(--seal); color: var(--seal); }

  /* ── Edit panel ──────────────────────────────────────────────────────── */
  .edit-panel {
    padding: 1rem 1.1rem;
    background: var(--dm-bg);
    border-top: 1px solid var(--dm-border);
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }
  .edit-panel-title {
    font-family: 'IM Fell English', serif;
    font-size: 0.85rem;
    color: var(--ink);
    letter-spacing: 0.06em;
    margin-bottom: 0.1rem;
  }
  .ef-row { display: flex; flex-direction: column; gap: 0.2rem; }
  .ef-label { font-size: 0.72rem; color: var(--ink-mid); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .ef-input, .ef-ta {
    padding: 0.35rem 0.6rem;
    border: 1px solid var(--border);
    background: var(--parch);
    color: var(--ink);
    font-size: 0.85rem;
    font-family: 'Crimson Pro', serif;
    width: 100%;
  }
  .ef-ta { min-height: 70px; resize: vertical; }
  .ef-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
  .ef-check { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--ink); cursor: pointer; }
  .ef-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; padding-top: 0.2rem; }
  .ef-save {
    font-family: 'IM Fell English', serif;
    font-size: 0.82rem;
    padding: 0.3rem 1rem;
    border: 1px solid var(--gold-dark);
    background: var(--parch-dark);
    color: var(--ink);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.12s;
  }
  .ef-save:hover { background: var(--parch-mid); }
  .ef-cancel {
    font-family: 'IM Fell English', serif;
    font-size: 0.82rem;
    padding: 0.3rem 1rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--ink-mid);
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  .ef-reset {
    font-family: 'IM Fell English', serif;
    font-size: 0.82rem;
    padding: 0.3rem 1rem;
    border: 1px solid var(--seal);
    background: transparent;
    color: var(--seal);
    cursor: pointer;
    letter-spacing: 0.05em;
    margin-left: auto;
  }
  .lk-edit-row { display: flex; gap: 0.5rem; align-items: center; }
  .lk-edit-label { font-size: 0.72rem; color: var(--ink-mid); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; white-space: nowrap; min-width: 90px; }

  /* ── Empty / footer ──────────────────────────────────────────────────── */
  .empty { text-align: center; padding: 2rem; font-style: italic; color: var(--ink-light); font-size: 0.9rem; }
  .board-footer {
    margin-top: 1.5rem;
    text-align: center;
    font-size: 0.78rem;
    color: var(--ink-light);
    font-style: italic;
  }

  @media (max-width: 600px) {
    .board-frame { padding: 1.2rem 1rem 1.8rem; }
    .quest-grid { grid-template-columns: 1fr; }
    .ef-2col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="page-header">
  <div class="header-rule"></div>
  <div class="guild-name">House of Iliaster</div>
  <div class="board-title">Guild Records — Aurelian Access</div>
</header>

<!-- Lock screen -->
<div id="lock-screen">
  <div class="lock-title">Aurelian Access Required</div>
  <div class="lock-sub">Enter the passphrase to access guild records.</div>
  <input class="lock-field" type="password" id="pw" placeholder="···" onkeydown="if(event.key==='Enter')unlock()">
  <br>
  <button class="lock-btn" onclick="unlock()">Enter</button>
  <div class="lock-error" id="lock-err">Passphrase not recognised.</div>
</div>

<!-- DM board (hidden until unlocked) -->
<div id="dm-board">
  <div class="board-frame">
    <div class="toolbar">
      <span class="dm-badge">Aurelian View</span>
      <select id="filter-tier" onchange="render()">
        <option value="all">All tiers</option>
        <option value="rat">Rat</option>
        <option value="ram">Ram</option>
        <option value="lion">Lion</option>
        <option value="dragon">Dragon</option>
        <option value="chimera">Chimera</option>
      </select>
      <select id="filter-status" onchange="render()">
        <option value="all">All statuses</option>
        <option value="available">Available</option>
        <option value="taken">Taken</option>
        <option value="expired">Expired</option>
        <option value="completed">Completed</option>
      </select>
      <span class="count-note" id="count-note"></span>
      <a class="back-link" href="index.html">← Player board</a>
    </div>
    <div id="board"></div>
    <div class="board-footer">Changes save to this browser. To update the live board, edit quests.json and redeploy.</div>
  </div>
</div>

<script>
const PASSPHRASE = 'iliaster';

const TIERS = [
  { key: 'rat',     label: 'Rat Tier' },
  { key: 'ram',     label: 'Ram Tier' },
  { key: 'lion',    label: 'Lion Tier' },
  { key: 'dragon',  label: 'Dragon Tier' },
  { key: 'chimera', label: 'Chimera Tier' }
];

const STATUS_COLOR = {
  available: '#2d6a2d',
  taken:     '#8b6508',
  expired:   '#5a5a5a',
  completed: '#1a5c5c'
};

let BASE = [];
let quests = [];
let statuses = {};
let hidden = {};
let editing = null;

function load(k, d) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } }
function persist() {
  localStorage.setItem('dm_q', JSON.stringify(quests));
  localStorage.setItem('dm_st', JSON.stringify(statuses));
  localStorage.setItem('dm_hid', JSON.stringify(hidden));
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function unlock() {
  const pw = document.getElementById('pw').value;
  if (pw === PASSPHRASE) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('dm-board').style.display = 'block';
  } else {
    const err = document.getElementById('lock-err');
    err.style.display = 'block';
    document.getElementById('pw').value = '';
  }
}

function gst(id) { return statuses[id] || 'available'; }
function ghid(id) { return !!hidden[id]; }
function gq(id) { return quests.find(q => q.id === id); }

function typeDisplay(q) {
  if (!q.type) return '';
  const types = Array.isArray(q.type) ? q.type : [q.type];
  return types.map(t => `<span class="type-pill">${esc(t)}</span>`).join('');
}

function cardHTML(q) {
  const st = gst(q.id);
  const hid = ghid(q.id);
  let cls = 'quest-card';
  if (q.timeSensitive) cls += ' urgent';
  if (hid) cls += ' hidden-card';

  const expires = q.timeSensitive && q.expires
    ? `<div class="expires-note">Expires: ${esc(q.expires)}</div>` : '';
  const lkDisplay = q.lkUrl
    ? `<div class="meta-row"><span class="meta-label">Records</span><span class="meta-val" style="word-break:break-all;font-size:0.75rem">${esc(q.lkUrl)}</span></div>` : '';

  const dmStrip = `<div class="dm-strip">
    ${typeDisplay(q)}
    <select class="dm-select" onchange="setSt('${q.id}',this.value)">
      ${['available','taken','expired','completed'].map(s =>
        `<option value="${s}"${s === st ? ' selected' : ''}>${s}</option>`
      ).join('')}
    </select>
    <button class="dm-btn${hid ? ' active' : ''}" onclick="toggleHid('${q.id}')">${hid ? 'Show' : 'Hide'}</button>
    <button class="dm-btn${editing === q.id ? ' active' : ''}" onclick="toggleEdit('${q.id}')">Edit</button>
  </div>`;

  let editPanel = '';
  if (editing === q.id) {
    editPanel = `<div class="edit-panel">
      <div class="edit-panel-title">Edit contract</div>
      <div class="ef-row">
        <div class="ef-label">Title</div>
        <input class="ef-input" id="ef-title" value="${esc(q.title)}">
      </div>
      <div class="ef-row">
        <div class="ef-label">Summary (player-facing)</div>
        <textarea class="ef-ta" id="ef-summary">${esc(q.summary)}</textarea>
      </div>
      <div class="ef-2col">
        <div class="ef-row">
          <div class="ef-label">Completion</div>
          <input class="ef-input" id="ef-comp" value="${esc(q.completion)}">
        </div>
        <div class="ef-row">
          <div class="ef-label">Contact</div>
          <input class="ef-input" id="ef-contact" value="${esc(q.contact)}">
        </div>
      </div>
      <div class="ef-2col">
        <div class="ef-row">
          <div class="ef-label">Reward</div>
          <input class="ef-input" id="ef-reward" value="${esc(q.reward)}">
        </div>
        <div class="ef-row">
          <div class="ef-label">Duration</div>
          <input class="ef-input" id="ef-length" value="${esc(q.length)}">
        </div>
      </div>
      <div class="ef-row">
        <div class="ef-label">Expiry note</div>
        <input class="ef-input" id="ef-expires" value="${esc(q.expires || '')}">
      </div>
      <label class="ef-check">
        <input type="checkbox" id="ef-ts"${q.timeSensitive ? ' checked' : ''}> Time-sensitive contract
      </label>
      <div class="lk-edit-row">
        <span class="lk-edit-label">LK Records URL</span>
        <input class="ef-input" id="ef-lk" value="${esc(q.lkUrl || '')}" placeholder="https://app.legendkeeper.com/...">
      </div>
      <div class="ef-actions">
        <button class="ef-save" onclick="saveEdit('${q.id}')">Save</button>
        <button class="ef-cancel" onclick="cancelEdit()">Cancel</button>
        <button class="ef-reset" onclick="resetQ('${q.id}')">Reset to original</button>
      </div>
    </div>`;
  }

  return `<div class="${cls}">
    <div class="status-bar" style="background:${STATUS_COLOR[st] || '#888'}"></div>
    <div class="card-body">
      <div class="card-title">${esc(q.title)}${hid ? ' <span style="font-size:0.72rem;color:#888;font-style:italic">[hidden from board]</span>' : ''}</div>
      <div class="card-summary">${esc(q.summary)}</div>
      ${expires}
      <div class="card-meta">
        <div class="meta-row"><span class="meta-label">Contact</span><span class="meta-val">${esc(q.contact)}</span></div>
        <div class="meta-row"><span class="meta-label">Duration</span><span class="meta-val">${esc(q.length)}</span></div>
        <div class="meta-row"><span class="meta-label">Completion</span><span class="meta-val">${esc(q.completion)}</span></div>
        <div class="meta-row"><span class="meta-label">Reward</span><span class="meta-reward">${esc(q.reward)}</span></div>
        ${lkDisplay}
      </div>
    </div>
    ${dmStrip}
    ${editPanel}
  </div>`;
}

function render() {
  const ft = document.getElementById('filter-tier').value;
  const fs = document.getElementById('filter-status').value;
  const board = document.getElementById('board');

  const filtered = quests.filter(q => {
    if (ft !== 'all' && q.tier !== ft) return false;
    if (fs !== 'all' && gst(q.id) !== fs) return false;
    return true;
  });

  document.getElementById('count-note').textContent =
    `${filtered.length} contract${filtered.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    board.innerHTML = '<div class="empty">No contracts match the current filters.</div>';
    return;
  }

  let html = '';
  for (const tier of TIERS) {
    const tq = filtered.filter(q => q.tier === tier.key);
    if (!tq.length) continue;
    html += `<div class="tier-header">
      <div class="tier-rule"></div>
      <div class="tier-label">${tier.label}</div>
      <div class="tier-rule"></div>
    </div>
    <div class="quest-grid">${tq.map(cardHTML).join('')}</div>`;
  }
  board.innerHTML = html;
}

window.setSt = function(id, v) { statuses[id] = v; persist(); render(); };
window.toggleHid = function(id) { hidden[id] = !hidden[id]; persist(); render(); };
window.toggleEdit = function(id) { editing = editing === id ? null : id; render(); };
window.cancelEdit = function() { editing = null; render(); };

window.saveEdit = function(id) {
  const q = gq(id);
  if (!q) return;
  const g = k => document.getElementById(k);
  if (g('ef-title'))   q.title        = g('ef-title').value;
  if (g('ef-summary')) q.summary      = g('ef-summary').value;
  if (g('ef-comp'))    q.completion   = g('ef-comp').value;
  if (g('ef-contact')) q.contact      = g('ef-contact').value;
  if (g('ef-reward'))  q.reward       = g('ef-reward').value;
  if (g('ef-length'))  q.length       = g('ef-length').value;
  if (g('ef-expires')) q.expires      = g('ef-expires').value;
  if (g('ef-ts'))      q.timeSensitive= g('ef-ts').checked;
  if (g('ef-lk'))      q.lkUrl        = g('ef-lk').value;
  editing = null;
  persist();
  render();
};

window.resetQ = function(id) {
  const orig = BASE.find(q => q.id === id);
  if (!orig) return;
  const i = quests.findIndex(q => q.id === id);
  if (i >= 0) quests[i] = { ...orig };
  editing = null;
  persist();
  render();
};

// Boot
fetch('quests.json')
  .then(r => r.json())
  .then(data => {
    BASE = data.map(q => ({ ...q }));
    const saved = load('dm_q', null);
    quests = saved && saved.length === BASE.length ? saved : BASE.map(q => ({ ...q }));
    statuses = load('dm_st', {});
    hidden   = load('dm_hid', {});
  })
  .catch(() => {
    quests = [];
  });

// Allow Enter on password field
document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});
</script>
</body>
</html>
